<!DOCTYPE html>
<html>
  <body>
    <form name="accessibility-form" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="accessibility-form" />
      <input name="bot-field" />
      <input type="url" name="website_url" />
      <input type="email" name="email" />
      <select name="website_maintainer">
        <option value="internal">Our internal team</option>
        <option value="external">An external developer or agency</option>
        <option value="mix">A mix of both</option>
        <option value="no_one">No one right now</option>
        <option value="not_sure">Not sure</option>
      </select>
      <textarea name="notes"></textarea>
      <button type="submit">Send</button>
    </form>
  </body>
</html>
